name: Build Android APK

# Build the debug APK on every push to master (and on manual trigger)
# so `git push` alone replaces the local tarball-upload step.
# Artifact name: taref-pos-debug  → matches the on-Desktop naming.

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 (matches project .nvmrc / engine)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Next.js static-export build (APK_BUILD gates output: "export" in next.config.mjs)
        run: APK_BUILD=1 npm run build

      - name: Setup JDK 17 (required by Capacitor 6 + Gradle 8)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK (cmdline-tools + platform 34 + build-tools 34)
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "13114758"
          packages: "platform-tools,platforms;android-34,build-tools;34.0.0"

      - name: Accept SDK licenses (android-sdk-image requires this on fresh runners)
        run: yes | sdkmanager --licenses

      - name: Capacitor sync (copy ./out → android/app/src/main/assets/public)
        run: npx cap sync android

      - name: Gradle assembleDebug
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload APK as downloadable artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: taref-pos-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
